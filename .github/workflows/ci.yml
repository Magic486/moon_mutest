name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  check:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install MoonBit on Unix
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Post install
        run: |
          moon version --all
          moon update

      - name: moon check
        run: moon check --target all

      - name: moon test
        run: moon test --target all

      - name: moon fmt --deny-warn / moon fmt && git diff --exit-code
        shell: bash
        run: |
          if moon fmt --help | grep -q -- '--deny-warn'; then
            moon fmt --deny-warn
          else
            moon fmt
            git diff --exit-code
          fi

      - name: moon info --deny-warn / moon info && git diff --exit-code
        shell: bash
        run: |
          if moon info --help | grep -q -- '--deny-warn'; then
            moon info --deny-warn
          else
            moon info
          fi
          git diff --exit-code

      - name: CLI scan example
        shell: bash
        run: |
          moon run --target js cmd/main -- scan "a == b && true" | tee scan-report.txt
          grep -q "total: 3" scan-report.txt
          grep -q "eq-to-ne" scan-report.txt
          grep -q "and-to-or" scan-report.txt
          grep -q "true-to-false" scan-report.txt

      - name: Mutation quality gate example
        shell: bash
        run: |
          temp_dir="_build/quality-gate-example-run-${{ matrix.os }}-${GITHUB_RUN_ID:-local}"
          rm -rf "$temp_dir"
          moon run --target js cmd/main -- run examples/quality_gate_workspace --max-mutants 1 --first 1 --temp-dir "$temp_dir" | tee mutation-report.txt
          grep -q "killed: 1" mutation-report.txt
          grep -q "survived: 0" mutation-report.txt
          grep -q "score: 100%" mutation-report.txt
