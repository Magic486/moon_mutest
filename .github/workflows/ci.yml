name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: moon version --all

      - name: moon check
        run: moon check --warn-list +73

      - name: moon fmt --deny-warn
        run: |
          if moon fmt --help | grep -q -- '--deny-warn'; then
            moon fmt --deny-warn
          else
            moon fmt --check
          fi

      - name: moon info --deny-warn
        run: |
          if moon info --help | grep -q -- '--deny-warn'; then
            moon info --deny-warn
          else
            moon info
            git diff --exit-code -- '**/pkg.generated.mbti'
          fi

      - name: Build
        run: moon build

      - name: moon test
        run: moon test --warn-list +73

      - name: Mutation quality gate example
        run: |
          temp_dir="_build/quality-gate-example-run-${GITHUB_RUN_ID:-local}"
          rm -rf "$temp_dir"
          moon run --target js cmd/main -- run examples/quality_gate_workspace --max-mutants 1 --first 1 --temp-dir "$temp_dir" | tee mutation-report.txt
          grep -q "killed: 1" mutation-report.txt
          grep -q "survived: 0" mutation-report.txt
          grep -q "score: 100%" mutation-report.txt
